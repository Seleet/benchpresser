<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <main class="calculator">
      <h1>Bench Press calculator</h1>
      <p>
        Calculate your estimated 1RM, training percentages, and rep max targets.
      </p>
      <section class="calculator-form">
        <h2>Enter your lift</h2>

        <form id="rm-form">
          <div class="form-group">
            <label for="weight">Weight</label>
            <input
              type="number"
              id="weight"
              name="weight"
              step="0.1"
              required
            />
          </div>
          <div class="form-group">
            <label for="reps">Reps</label>
            <input type="number" id="reps" name="reps" required />
          </div>

          <button type="submit">Calculate</button>
        </form>
      </section>

      <section class="calculator-result">
        <h2>Your 1RM is: <span id="one-rep-max">-</span>kg's</h2>
      </section>

      <section class="percentage-table">
        <h2>Training Percentages</h2>
        <table>
          <thead>
            <tr>
              <th>Percentage of 1RM</th>
              <th>Lift Weight</th>
            </tr>
          </thead>
          <tbody id="percentage-body">
            <!-- JS fyller denna -->
          </tbody>
        </table>
      </section>

      <section class="repmax-table">
        <h2>Rep Max Weights</h2>

        <table>
          <thead>
            <tr>
              <th>Repetitions</th>
              <th>Lift Weight</th>
            </tr>
          </thead>
          <tbody id="repmax-body">
            <!-- JS fyller denna -->
          </tbody>
        </table>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
